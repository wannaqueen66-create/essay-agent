name: essay-agent fusion

on:
  schedule:
    - cron: "15 19 * * *"
  workflow_dispatch:
    inputs:
      skip_run:
        description: "Skip essay-agent fetch/analyze and only sync existing SQLite"
        required: false
        default: "false"
      no_embeddings:
        description: "Disable embedding generation for essay-agent rows"
        required: false
        default: "false"

permissions:
  contents: write
  actions: write

concurrency:
  group: essay-agent-fusion
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
      LLM_API_MODE: ${{ secrets.LLM_API_MODE }}
      LLM_MAX_OUTPUT_TOKENS: ${{ secrets.LLM_MAX_OUTPUT_TOKENS }}
      ANTHROPIC_VERSION: ${{ secrets.ANTHROPIC_VERSION }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
      DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
      CORE_API_KEY: ${{ secrets.CORE_API_KEY }}
      DAYS_BACK: ${{ secrets.ESSAY_AGENT_DAYS_BACK }}
      MAX_RESULTS_PER_QUERY: ${{ secrets.ESSAY_AGENT_MAX_RESULTS_PER_QUERY }}
      MIN_RELEVANCE_SCORE: ${{ secrets.ESSAY_AGENT_MIN_RELEVANCE_SCORE }}
      REPORT_TOP_N: ${{ secrets.ESSAY_AGENT_REPORT_TOP_N }}
      EMAIL_TOP_N: ${{ secrets.ESSAY_AGENT_EMAIL_TOP_N }}
      PENDING_POOL_DAYS: ${{ secrets.ESSAY_AGENT_PENDING_POOL_DAYS }}
      EMAIL_ENABLED: ${{ secrets.EMAIL_ENABLED }}
      EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
      EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
      EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      EMAIL_USE_TLS: ${{ secrets.EMAIL_USE_TLS }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      SUPABASE_SCHEMA: ${{ secrets.SUPABASE_SCHEMA }}
      ESSAY_AGENT_DB_PATH: papers.db
      ESSAY_AGENT_SUPABASE_PAPERS_TABLE: essay_agent_papers
      ESSAY_AGENT_SUPABASE_RUNS_TABLE: essay_agent_daily_runs
      DPR_EMBED_API_URL: ${{ secrets.DPR_EMBED_API_URL }}
      DPR_EMBED_API_KEY: ${{ secrets.DPR_EMBED_API_KEY }}
      DPR_EMBED_API_TIMEOUT: ${{ secrets.DPR_EMBED_API_TIMEOUT }}
      DPR_EMBED_ALLOW_LOCAL_FALLBACK: ${{ secrets.DPR_EMBED_ALLOW_LOCAL_FALLBACK }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install arxiv pandas pyyaml python-dotenv openai openpyxl requests numpy

      - name: Run essay-agent and sync Supabase
        run: |
          export OPENAI_API_KEY="${OPENAI_API_KEY:-$DEEPSEEK_API_KEY}"
          export OPENAI_BASE_URL="${OPENAI_BASE_URL:-$DEEPSEEK_BASE_URL}"
          export OPENAI_MODEL="${OPENAI_MODEL:-${DEEPSEEK_MODEL:-gpt-4.1-mini}}"
          export ANTHROPIC_BASE_URL="${ANTHROPIC_BASE_URL:-https://api.anthropic.com}"
          export LLM_API_MODE="${LLM_API_MODE:-auto}"
          export LLM_MAX_OUTPUT_TOKENS="${LLM_MAX_OUTPUT_TOKENS:-2048}"
          export ANTHROPIC_VERSION="${ANTHROPIC_VERSION:-2023-06-01}"
          export DAYS_BACK="${DAYS_BACK:-2}"
          export MAX_RESULTS_PER_QUERY="${MAX_RESULTS_PER_QUERY:-30}"
          export MIN_RELEVANCE_SCORE="${MIN_RELEVANCE_SCORE:-60}"
          export REPORT_TOP_N="${REPORT_TOP_N:-10}"
          export EMAIL_TOP_N="${EMAIL_TOP_N:-5}"
          export PENDING_POOL_DAYS="${PENDING_POOL_DAYS:-7}"
          export EMAIL_ENABLED="${EMAIL_ENABLED:-false}"
          export EMAIL_SMTP_HOST="${EMAIL_SMTP_HOST:-smtp-relay.brevo.com}"
          export EMAIL_SMTP_PORT="${EMAIL_SMTP_PORT:-587}"
          export EMAIL_USE_TLS="${EMAIL_USE_TLS:-true}"
          export SUPABASE_SCHEMA="${SUPABASE_SCHEMA:-public}"
          export DPR_EMBED_API_URL="${DPR_EMBED_API_URL:-https://zwwen.online/embed}"
          export DPR_EMBED_API_TIMEOUT="${DPR_EMBED_API_TIMEOUT:-60}"
          export DPR_EMBED_ALLOW_LOCAL_FALLBACK="${DPR_EMBED_ALLOW_LOCAL_FALLBACK:-0}"
          ARGS=()
          if [ "${{ github.event.inputs.skip_run }}" = "true" ]; then ARGS+=("--skip-run"); fi
          if [ "${{ github.event.inputs.no_embeddings }}" = "true" ]; then ARGS+=("--no-embeddings"); fi
          python src/essay_agent_actions_runner.py "${ARGS[@]}"

      - name: Export Supabase backup
        if: always() && env.SUPABASE_URL != '' && env.SUPABASE_SERVICE_KEY != ''
        run: |
          export SUPABASE_SCHEMA="${SUPABASE_SCHEMA:-public}"
          python src/supabase_backup.py \
            --tables "${SUPABASE_BACKUP_TABLES:-essay_agent_papers,essay_agent_daily_runs,user_paper_states}" \
            --out-dir archive/supabase-backups

      - name: Upload essay-agent outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: essay-agent-fusion-${{ github.run_id }}
          path: |
            output/
            archive/essay-agent/
            archive/supabase-backups/
            papers.db
          if-no-files-found: ignore

      - name: Commit public generated backups
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add archive/essay-agent || true
          git diff --cached --quiet || git commit -m "chore: update essay-agent public backups"
          git push || true
